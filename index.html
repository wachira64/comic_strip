<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <title>Eric Wachira — Comics</title>
  <meta name="description" content="Comics by Eric Wachira — stories from East Africa">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ══ SCREEN 1: LIBRARY ════════════════════════════ -->
  <div id="screen-library" class="screen active">
    <header class="lib-header">
      <div class="lib-brand">Eric Wachira</div>
      <div class="lib-tagline">Comics for curious minds — stories from East Africa</div>
      <div class="lib-rule"></div>
    </header>
    <div class="lib-section-label">Available Now</div>
    <!-- Cards are built dynamically by app.js from comics.js data -->
    <div class="lib-grid" id="lib-grid"></div>
  </div>

  <!-- ══ SCREEN 2: LANDING ════════════════════════════ -->
  <div id="screen-landing" class="screen">
    <div class="landing-bg" id="landing-bg"></div>

    <button class="landing-back" onclick="showLibrary()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Library
    </button>

    <div class="landing-content">
      <div class="landing-eyebrow" id="landing-eyebrow"></div>
      <div class="landing-title"   id="landing-title"></div>
      <div class="landing-rule"></div>
      <div class="landing-desc"    id="landing-desc"></div>
      <div class="landing-meta">
        <div class="landing-meta-item">
          <div class="landing-meta-num"   id="landing-panel-count">—</div>
          <div class="landing-meta-label">Panels</div>
        </div>
        <div class="landing-meta-item">
          <div class="landing-meta-num">Eric</div>
          <div class="landing-meta-label">Wachira</div>
        </div>
      </div>
      <button class="landing-btn" onclick="startReading()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
        </svg>
        Start Reading
      </button>
    </div>
  </div>

  <!-- ══ SCREEN 3: READER ═════════════════════════════ -->
  <div id="screen-reader" class="screen">

    <div class="reader-topbar">
      <button class="reader-back" onclick="showLanding(activeComic)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        <span>Back</span>
      </button>
      <div class="reader-comic-title" id="reader-comic-title"></div>
      <div class="reader-progress-label" id="progress-label">1 / —</div>
    </div>

    <div class="reader-viewport">
      <div class="reader-progress-bar-wrap">
        <div class="reader-progress-bar" id="progress-bar" style="width: 0%"></div>
      </div>

      <div class="reader-narration">
        <p id="reader-title-text"></p>
      </div>

      <div class="reader-img-area" id="img-area">
        <img id="panel-img" src="" alt="Comic panel">
      </div>

      <div class="reader-caption">
        <p id="reader-caption-text"></p>
      </div>

      <div class="reader-controls">
        <button class="nav-btn" id="btn-prev" onclick="prevPanel()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          <span>Prev</span>
        </button>

        <div class="reader-dots" id="dots-container"></div>

        <button class="nav-btn" id="btn-next" onclick="nextPanel()">
          <span>Next</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Scripts — data first, then app logic -->
  <script src="js/comics.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
